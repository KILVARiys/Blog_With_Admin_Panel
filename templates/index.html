<!DOCTYPE html>
<html>
<head>
    <title>Мой блог</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Мой блог</h1>
    <nav>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('admin') }}">Админка</a>
            <a href="{{ url_for('logout') }}">Выйти</a>
        {% else %}
            <a href="{{ url_for('login') }}">Войти</a>
        {% endif %}
    </nav>
    
    <h2>Последние посты</h2>
    {% if posts %}
        {% for post in posts %}
            <article>
                <h3><a href="{{ url_for('show_post', post_id=post[0]) }}">{{ post[1] }}</a></h3>
                <p>{{ post[2][:200] }}...</p>
                <small>Опубликовано: {{ post[3] }}</small>
                <hr>
            </article>
        {% endfor %}
    {% else %}
        <p>Пока нет постов.</p>
    {% endif %}
</body>
</html>
