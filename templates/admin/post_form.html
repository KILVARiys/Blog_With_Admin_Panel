{% extends "base.html" %}

{% block title %}{% if post %}Редактирование{% else %}Создание{% endif %} поста{% endblock %}

{% block content %}
    <h1>{% if post %}Редактирование{% else %}Создание{% endif %} поста</h1>
    
    <form method="POST" class="post-form">
        <!-- CSRF токен - ОБЯЗАТЕЛЬНО! -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div>
            <label for="title">Заголовок:</label>
            <input type="text" id="title" name="title" 
                   value="{{ post[0] if post else '' }}" required>
        </div>
        
        <div>
            <label for="content">Содержание:</label>
            <textarea id="content" name="content" rows="10" required>{{ post[1] if post else '' }}</textarea>
        </div>
        
        <button type="submit">{% if post %}Обновить{% else %}Создать{% endif %}</button>
    </form>
    
    <p><a href="{{ url_for('admin') }}">Назад в админку</a></p>
{% endblock %}
