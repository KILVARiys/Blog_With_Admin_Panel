<!DOCTYPE html>
<html>
<head>
    <title>{% if post %}Редактирование{% else %}Создание{% endif %} поста</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{% if post %}Редактирование{% else %}Создание{% endif %} поста</h1>
    
    <form method="POST">
        <div>
            <label>Заголовок:</label>
            <input type="text" name="title" value="{{ post[0] if post else '' }}" required>
        </div>
        <div>
            <label>Содержание:</label>
            <textarea name="content" rows="10" cols="50" required>{{ post[1] if post else '' }}</textarea>
        </div>
        <button type="submit">{% if post %}Обновить{% else %}Создать{% endif %}</button>
    </form>
    <br>
    <a href="{{ url_for('admin') }}">Назад в админку</a>
</body>
</html>
